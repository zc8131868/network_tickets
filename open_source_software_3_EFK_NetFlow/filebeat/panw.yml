# Module: panw (Palo Alto Networks PAN-OS)
# Docs: https://www.elastic.co/guide/en/beats/filebeat/7.17/filebeat-module-panw.html
# Index routing: panw-logs-* (via output.elasticsearch.indices condition on event.dataset)

- module: panw
  panos:
    enabled: true
    var.syslog_host: 0.0.0.0
    var.syslog_port: 9510
