version: '3'
services:
  elasticsearch:
    image: elastic/elasticsearch:7.17.21
    environment:
      - discovery.type=single-node
      - node.name=qytang_es
      - cluster.name=qytang_es_cluster
      - network.host=0.0.0.0
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
      - TZ=Asia/Shanghai
      - xpack.license.self_generated.type=trial
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/server-key-elasticsearch.pem
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.cer
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/server-elasticsearch.pem
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.cer
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/server-elasticsearch.pem
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/server-key-elasticsearch.pem
      - ELASTIC_PASSWORD=Cmhk@94!
    volumes:
      - ./certs:/usr/share/elasticsearch/config/certs
    networks:
      qyt_net:
        aliases:
          - elasticsearch.qytopensource.com
    ports:
      - "9200:9200"
      - "9300:9300"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: always
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.21
    environment:
      - TZ=Asia/Shanghai
      - ELASTICSEARCH_URL=https://elasticsearch.qytopensource.com:9200
      - ELASTICSEARCH_HOSTS=https://elasticsearch.qytopensource.com:9200
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca.cer
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=Cmhk@94!
      - SERVER_NAME=kibana
      - XPACK_MONITORING_ENABLED=true
      - XPACK_SECURITY_ENABLED=true
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_KEY=/usr/share/kibana/config/certs/server-key-kibana.pem
      - SERVER_SSL_CERTIFICATE=/usr/share/kibana/config/certs/server-kibana.pem
    volumes:
      - ./certs:/usr/share/kibana/config/certs
    networks:
      qyt_net:
        aliases:
          - kibana.qytopensource.com
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: always
  filebeat:
    image: elastic/filebeat:7.17.21
    privileged: true
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./filebeat/cisco.yml:/usr/share/filebeat/modules.d/cisco.yml
      - ./filebeat/panw.yml:/usr/share/filebeat/modules.d/panw.yml
      - ./filebeat/filebeat-tls.yml:/usr/share/filebeat/filebeat.yml
      - ./certs/ca.cer:/usr/share/filebeat/config/certs/ca.cer
    networks:
      - qyt_net
    ports:
      - "514:9001/udp"    # Cisco ASA syslog
      - "5140:9002/udp"   # Cisco IOS / IOS-XE syslog
      - "5141:9506/udp"   # Cisco Nexus syslog
      - "5142:9510/udp"   # Palo Alto (PAN-OS) syslog
    depends_on:
      - "elasticsearch"
      - "kibana"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: always
  filebeat-netflow:
    image: elastic/filebeat:7.17.21
    privileged: true
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./filebeat-netflow/netflow.yml:/usr/share/filebeat/modules.d/netflow.yml
      - ./filebeat-netflow/netflow-mod-ip.js:/etc/filebeat/netflow-mod-ip.js
      - ./filebeat-netflow/netflow-mod-domain.js:/etc/filebeat/netflow-mod-domain.js
      - ./filebeat-netflow/filebeat-tls.yml:/usr/share/filebeat/filebeat.yml
      - ./certs/ca.cer:/usr/share/filebeat/config/certs/ca.cer
    networks:
      - qyt_net
    ports:
      - "2055:2055/udp"
    depends_on:
      - "elasticsearch"
      - "kibana"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: always
